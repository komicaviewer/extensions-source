name: Build & Publish Extensions

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install Android build-tools
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" > /dev/null 2>&1 || true
          echo "AAPT=$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" >> $GITHUB_ENV

      - name: Setup signing keystore
        run: |
          if [ -n "${SIGNING_KEY}" ]; then
            echo "${SIGNING_KEY}" | base64 --decode > keystore.jks
            echo "KEY_STORE_PASSWORD=${KEY_STORE_PASSWORD_INPUT}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${KEY_ALIAS_INPUT}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${KEY_PASSWORD_INPUT}" >> $GITHUB_ENV
          else
            echo "No SIGNING_KEY secret found, generating debug keystore"
            keytool -genkeypair -v \
              -keystore keystore.jks \
              -storepass android \
              -alias key0 \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Debug,O=Debug,C=US" 2>/dev/null
            echo "KEY_STORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=key0" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
          fi
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD_INPUT: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS_INPUT: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD_INPUT: ${{ secrets.KEY_PASSWORD }}

      - name: Build all extensions
        run: |
          TASKS=$(find src -maxdepth 1 -mindepth 1 -type d | while read d; do
            [ -f "$d/build.gradle.kts" ] && echo ":src:$(basename $d):assembleRelease"
          done | tr '\n' ' ')
          echo "Building tasks: $TASKS"
          ./gradlew $TASKS

      - name: Collect and rename APKs
        run: |
          mkdir -p output/apk
          find . -name "*.apk" -path "*/release/*" | while read apk; do
            # Extract module name from path: ./src/<module>/build/...
            module=$(echo "$apk" | sed 's|.*/src/\([^/]*\)/build/.*|\1|')
            # Extract versionName with anchored regex (avoids matching compileSdkVersionCodename)
            version=$($AAPT dump badging "$apk" 2>/dev/null | grep "^package:" | \
              sed "s/^package: name='[^']*' versionCode='[0-9]*' versionName='\([^']*\)'.*/\1/")
            if [ -n "$module" ] && [ -n "$version" ]; then
              apk_name="newshub-${module}-v${version}.apk"
              cp "$apk" "output/apk/${apk_name}"
              echo "Collected: ${apk_name}"
            else
              echo "WARNING: module='${module}' version='${version}' from ${apk}, skipping"
            fi
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extensions-apk
          path: output/apk/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout extensions-source (for scripts)
        uses: actions/checkout@v4
        with:
          path: extensions-source

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: extensions-apk
          path: apks/

      - name: Install Android build-tools
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" > /dev/null 2>&1 || true
          echo "AAPT=$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" >> $GITHUB_ENV

      - name: Checkout extensions repo
        uses: actions/checkout@v4
        with:
          repository: komicaviewer/extensions
          token: ${{ secrets.EXTENSIONS_REPO_TOKEN }}
          path: extensions-repo

      - name: Generate index.json and publish
        run: |
          python3 extensions-source/scripts/generate_index.py apks/ extensions-repo/ extensions-source/
          cd extensions-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update extensions index [skip ci]"
          git push
        env:
          AAPT: ${{ env.AAPT }}
